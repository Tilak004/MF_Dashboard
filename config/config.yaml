server:
  port: 8080
  read_timeout: 30
  write_timeout: 30

database:
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_lifetime: 300

cron:
  nav_fetch_time: "0 20 * * *"    # 8 PM IST daily
  sip_check_time: "0 9 * * *"     # 9 AM IST daily

mfapi:
  base_url: "https://www.mfapi.in"
  timeout: 30
  retry_attempts: 3
  retry_delay: 2

email:
  from_name: "MF Dashboard"
  max_retries: 3
