services:
  - type: web
    name: mf-dashboard
    env: go
    plan: free
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      # Linked automatically from the Postgres database below
      - key: DATABASE_URL
        fromDatabase:
          name: mf-dashboard-db
          property: connectionString

      # Auto-generated secure random string — no need to set this manually
      - key: SESSION_SECRET
        generateValue: true

      # SMTP — fill these in on Render's dashboard manually (sync: false = secret)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL
        sync: false

databases:
  - name: mf-dashboard-db
    databaseName: mf_dashboard
    plan: free
